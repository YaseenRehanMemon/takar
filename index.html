<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meharbano Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #080810;
    color: #e0d8ce;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow-x: hidden;
  }

  /* ── Login Screen ── */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #12121f 0%, #080810 70%);
  }

  .login-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .login-box h1 {
    text-align: center;
    font-size: 28px;
    color: #f0c27a;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .login-box p {
    text-align: center;
    color: #8a8078;
    margin-bottom: 32px;
    font-size: 14px;
  }

  .login-box label {
    display: block;
    font-size: 13px;
    color: #9a9088;
    margin-bottom: 6px;
    margin-top: 16px;
  }

  .login-box input[type="text"],
  .login-box input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #e0d8ce;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
  }

  .login-box input:focus {
    border-color: #f0c27a;
  }

  .login-btn {
    width: 100%;
    margin-top: 28px;
    padding: 13px;
    background: linear-gradient(135deg, #f0c27a, #c4944a);
    color: #080810;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .login-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(240,194,122,0.3);
  }

  .login-error {
    color: #e74c3c;
    text-align: center;
    margin-top: 16px;
    font-size: 14px;
    min-height: 20px;
  }

  /* ── Dashboard ── */
  #dashboard {
    display: none;
    min-height: 100vh;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-wrap: wrap;
    gap: 12px;
  }

  .header h1 {
    font-size: 24px;
    color: #f0c27a;
    letter-spacing: 1px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .btn:hover {
    transform: translateY(-1px);
  }

  .btn-primary {
    background: linear-gradient(135deg, #f0c27a, #c4944a);
    color: #080810;
  }

  .btn-primary:hover {
    box-shadow: 0 4px 16px rgba(240,194,122,0.3);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #e0d8ce;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.12);
    box-shadow: 0 4px 16px rgba(255,255,255,0.05);
  }

  .btn-danger {
    background: rgba(231,76,60,0.15);
    color: #e74c3c;
    border: 1px solid rgba(231,76,60,0.2);
  }

  .btn-danger:hover {
    background: rgba(231,76,60,0.25);
  }

  /* Upload Area */
  .upload-section {
    padding: 24px 32px;
  }

  .upload-area {
    border: 2px dashed rgba(240,194,122,0.3);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.3s, background 0.3s;
  }

  .upload-area:hover,
  .upload-area.dragover {
    border-color: #f0c27a;
    background: rgba(240,194,122,0.05);
  }

  .upload-area svg {
    width: 48px;
    height: 48px;
    margin-bottom: 12px;
    color: #f0c27a;
  }

  .upload-area p {
    color: #8a8078;
    font-size: 15px;
  }

  .upload-area span {
    color: #f0c27a;
    text-decoration: underline;
  }

  #fileInput {
    display: none;
  }

  /* Gallery */
  .gallery-section {
    padding: 8px 32px 32px;
  }

  .gallery-section h2 {
    font-size: 18px;
    color: #c4a46a;
    margin-bottom: 20px;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  .gallery-item {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 1;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .gallery-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.5);
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .gallery-item .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 32px;
    height: 32px;
    background: rgba(231,76,60,0.85);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .gallery-item:hover .delete-btn {
    display: flex;
  }

  .gallery-item .delete-btn:hover {
    background: #c0392b;
  }

  .gallery-item .img-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 8px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    color: #e0d8ce;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .gallery-item:hover .img-label {
    opacity: 1;
  }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }

  #lightbox.active {
    display: flex;
  }

  #lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    object-fit: contain;
  }

  #lightbox .close-btn {
    position: absolute;
    top: 20px;
    right: 24px;
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: #5a5550;
    font-size: 15px;
  }

  /* ── Visit Badge ── */
  .visit-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: rgba(240,194,122,0.1);
    border: 1px solid rgba(240,194,122,0.2);
    border-radius: 20px;
    font-size: 13px;
    color: #f0c27a;
  }

  .visit-badge .count {
    font-weight: 700;
    font-size: 15px;
  }

  /* ── Settings Panel ── */
  #settingsOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 900;
    align-items: center;
    justify-content: center;
  }

  #settingsOverlay.active {
    display: flex;
  }

  .settings-box {
    background: #13131f;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }

  .settings-box h2 {
    color: #f0c27a;
    font-size: 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .settings-box h2 button {
    background: none;
    border: none;
    color: #8a8078;
    font-size: 22px;
    cursor: pointer;
  }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .settings-row:last-child {
    border-bottom: none;
  }

  .settings-row .label {
    color: #9a9088;
    font-size: 14px;
  }

  .settings-row .value {
    color: #e0d8ce;
    font-weight: 600;
    font-size: 15px;
  }

  .settings-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .settings-actions .btn {
    flex: 1;
    text-align: center;
  }

  .btn-settings {
    background: rgba(255,255,255,0.06);
    color: #e0d8ce;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 14px;
    font-size: 13px;
  }

  .btn-settings:hover {
    background: rgba(255,255,255,0.1);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .header { padding: 16px; }
    .upload-section, .gallery-section { padding-left: 16px; padding-right: 16px; }
    .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .login-box { margin: 16px; padding: 32px 24px; }
    .settings-box { margin: 16px; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-box">
    <h1>Meharbano</h1>
    <p>Enter your credentials to continue</p>
    <label for="username">Username</label>
    <input type="text" id="username" autocomplete="username" placeholder="Enter username">
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" placeholder="Enter password">
    <button class="login-btn" onclick="handleLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="header">
    <h1>Meharbano Gallery</h1>
    <div class="header-actions">
      <div class="visit-badge">
        Total visits: <span class="count" id="totalVisits">0</span>
      </div>
      <button class="btn btn-settings" onclick="openSettings()">Settings</button>
      <button class="btn btn-primary" onclick="window.open('formehru.html','_blank')">
        Open Mehru's Page
      </button>
      <button class="btn btn-danger" onclick="handleLogout()">Logout</button>
    </div>
  </div>

  <!-- Upload -->
  <div class="upload-section">
    <div class="upload-area" id="uploadArea">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <p>Drag & drop images here or <span>browse files</span></p>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <!-- Static Images -->
  <div class="gallery-section">
    <h2>Gallery</h2>
    <div class="gallery-grid" id="staticGallery"></div>
  </div>

  <!-- Uploaded Images -->
  <div class="gallery-section" id="uploadedSection" style="display:none;">
    <h2>Uploaded Images</h2>
    <div class="gallery-grid" id="uploadedGallery"></div>
  </div>
</div>

<!-- Settings Panel -->
<div id="settingsOverlay">
  <div class="settings-box">
    <h2>Settings <button onclick="closeSettings()">&times;</button></h2>
    <div class="settings-row">
      <span class="label">Total visits (all time)</span>
      <span class="value" id="settingsTotal">0</span>
    </div>
    <div class="settings-row">
      <span class="label">Visits today</span>
      <span class="value" id="settingsToday">0</span>
    </div>
    <div class="settings-actions">
      <button class="btn btn-secondary" onclick="resetVisits()">Reset Visit Counter</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button class="close-btn" onclick="closeLightbox()">&times;</button>
  <img id="lightboxImg" src="" alt="Preview">
</div>

<script>
  // ── Config ──
  const CREDENTIALS = { username: 'pode', password: 'meharbanoammar' };
  const STATIC_IMAGES = [

    'IMG-20260327-WA0067 (1).jpg',
    'VID-20260327-WA0068.mp4',
    'Pasted image.png'
  ];
  const DB_NAME = 'MeharbanoGallery';
  const STORE_NAME = 'uploadedImages';

  // ── Visit Tracking ──
  function getTodayKey() {
    const d = new Date();
    return `mb_visits_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function getVisitsToday() {
    return parseInt(localStorage.getItem(getTodayKey()) || '0', 10);
  }

  function getTotalVisits() {
    return parseInt(localStorage.getItem('mb_total_visits') || '0', 10);
  }

  function incrementVisit() {
    // Increment today's count
    const todayKey = getTodayKey();
    localStorage.setItem(todayKey, String(getVisitsToday() + 1));
    // Increment all-time total
    localStorage.setItem('mb_total_visits', String(getTotalVisits() + 1));
  }

  function updateVisitBadge() {
    document.getElementById('totalVisits').textContent = getTotalVisits();
  }

  // ── Auth ──
  function handleLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const err = document.getElementById('loginError');

    if (user === CREDENTIALS.username && pass === CREDENTIALS.password) {
      incrementVisit();
      showDashboard();
    } else {
      err.textContent = 'Invalid username or password';
      setTimeout(() => err.textContent = '', 3000);
    }
  }

  function handleLogout() {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
  }

  function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    updateVisitBadge();
    renderStaticImages();
    loadUploadedImages();
  }

  // Enter key on login
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('username').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  // ── Static Images ──
  function renderStaticImages() {
    const grid = document.getElementById('staticGallery');
    grid.innerHTML = '';
    STATIC_IMAGES.forEach(src => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = `
        <img src="${src}" alt="${src}" loading="lazy">
        <div class="img-label">${src}</div>
      `;
      item.addEventListener('click', () => openLightbox(src));
      grid.appendChild(item);
    });
  }

  // ── IndexedDB ──
  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
        }
      };
      request.onsuccess = (e) => resolve(e.target.result);
      request.onerror = (e) => reject(e.target.error);
    });
  }

  async function saveImage(name, dataUrl) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      store.add({ name, data: dataUrl, timestamp: Date.now() });
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  }

  async function getAllImages() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const request = store.getAll();
      request.onsuccess = () => resolve(request.result);
      request.onerror = (e) => reject(e.target.error);
    });
  }

  async function deleteImage(id) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      store.delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  }

  // ── Uploaded Images ──
  async function loadUploadedImages() {
    const images = await getAllImages();
    const section = document.getElementById('uploadedSection');
    const grid = document.getElementById('uploadedGallery');
    grid.innerHTML = '';

    if (images.length === 0) {
      section.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    images.forEach(img => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = `
        <img src="${img.data}" alt="${img.name}">
        <button class="delete-btn" title="Delete">&times;</button>
        <div class="img-label">${img.name}</div>
      `;
      item.querySelector('img').addEventListener('click', () => openLightbox(img.data));
      item.querySelector('.delete-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        await deleteImage(img.id);
        loadUploadedImages();
      });
      grid.appendChild(item);
    });
  }

  // ── Upload Handling ──
  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('fileInput');

  uploadArea.addEventListener('click', () => fileInput.click());

  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });

  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
  });

  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener('change', () => {
    handleFiles(fileInput.files);
    fileInput.value = '';
  });

  async function handleFiles(files) {
    for (const file of files) {
      if (!file.type.startsWith('image/')) continue;
      const dataUrl = await readFileAsDataUrl(file);
      await saveImage(file.name, dataUrl);
    }
    loadUploadedImages();
  }

  function readFileAsDataUrl(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(file);
    });
  }

  // ── Lightbox ──
  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('active');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightboxImg').src = '';
  }

  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });

  // ── Settings Panel ──
  function openSettings() {
    document.getElementById('settingsTotal').textContent = getTotalVisits();
    document.getElementById('settingsToday').textContent = getVisitsToday();
    document.getElementById('settingsOverlay').classList.add('active');
  }

  function closeSettings() {
    document.getElementById('settingsOverlay').classList.remove('active');
  }

  function resetVisits() {
    localStorage.setItem('mb_total_visits', '0');
    localStorage.setItem(getTodayKey(), '0');
    document.getElementById('settingsTotal').textContent = '0';
    document.getElementById('settingsToday').textContent = '0';
    updateVisitBadge();
    closeSettings();
  }

  document.getElementById('settingsOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('settingsOverlay')) closeSettings();
  });

  // ── Init ──
  // Always show login screen on page load (no saved sessions)
</script>
</body>
</html>
